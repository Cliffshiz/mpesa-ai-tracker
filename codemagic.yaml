workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Create native project files
        script: |
          flutter create --org com.mpesaaitracker --project-name mpesa_ai_tracker .
      - name: Patch missing namespaces and JVM target in old plugins
        script: |
          cat >> android/build.gradle << 'EOF'

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) {
                              namespace project.group.toString() ?: "com.mpesaaitracker.fallback"
                          }
                          compileOptions {
                              sourceCompatibility JavaVersion.VERSION_11
                              targetCompatibility JavaVersion.VERSION_11
                          }
                      }
                      project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                          kotlinOptions {
                              jvmTarget = "11"
                          }
                      }
                  }
              }
          }
          EOF
      - name: Disable code shrinking for release build
        script: |
          cat >> android/app/build.gradle << 'EOF'

          android {
              buildTypes {
                  release {
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          EOF
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate Hive adapter files
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
