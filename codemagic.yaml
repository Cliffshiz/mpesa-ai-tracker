workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Create native project files
        script: |
          flutter create --org com.mpesaaitracker --project-name mpesa_ai_tracker .
      - name: Patch missing namespaces, JVM target, and compileSdk in old plugins
        script: |
          cat >> android/build.gradle << 'EOF'

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) {
                              namespace project.group.toString() ?: "com.mpesaaitracker.fallback"
                          }
                          compileSdkVersion 36
                          compileOptions {
                              sourceCompatibility JavaVersion.VERSION_11
                              targetCompatibility JavaVersion.VERSION_11
                          }
                      }
                      project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                          kotlinOptions {
                              jvmTarget = "11"
                          }
                      }
                  }
              }
          }
          EOF
      - name: Add ProGuard rules for optional ML Kit language packs
        script: |
          cat >> android/app/proguard-rules.pro << 'EOF'
          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -keep class com.google.mlkit.vision.text.** { *; }
          EOF
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate Hive adapter files
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build APK directly with Gradle
        script: |
          cd android
          ./gradlew assembleRelease
          cd ..
          echo "Searching for the built APK:"
          find . -name "*.apk"
    artifacts:
      - "**/*.apk"
