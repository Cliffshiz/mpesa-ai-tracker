name: mpesa_ai_tracker
description: Privacy-first AI-powered M-Pesa transaction tracker.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  telephony: ^0.2.0
  workmanager: ^0.9.0
  permission_handler: ^11.3.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  http: ^1.2.1
  local_auth: ^2.3.0          # biometric lock
  google_mlkit_text_recognition: ^0.13.0  # receipt OCR
  image_picker: ^1.1.2
  pdf: ^3.11.1
  csv: ^6.0.0
  path_provider: ^2.1.4
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
